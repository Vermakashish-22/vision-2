<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<title>FaceMeet Meeting</title>

</head>
<style>

#video-grid{
height:100%;
overflow-y:auto;
align-content:flex-start;
}

/* smooth scroll */
#video-grid::-webkit-scrollbar{
width:6px;
}

#video-grid::-webkit-scrollbar-thumb{
background:#334155;
border-radius:10px;
}

.pb-safe{
padding-bottom: env(safe-area-inset-bottom);
}


.ai-overlay{
animation: fadeIn 0.4s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(-5px)}
to{opacity:1; transform:translateY(0)}
}

.control-btn{
width:44px;
height:44px;
border-radius:999px;
background:#1e293b;
display:flex;
align-items:center;
justify-content:center;
transition: all 0.2s ease;
}

.control-btn:hover{
background:#334155;
}

.control-btn svg{
width:20px;
height:20px;
}


.control-btn:active{
transform:scale(0.9);
}

@media (max-width:640px){

#controlBar{
bottom:12px;
border-radius:16px;
margin:0 12px;
}

}
</style>

<body class="h-screen bg-black text-white flex flex-col overflow-hidden">


<div class="h-14 flex items-center justify-between px-6 border-b border-slate-800">

<div class="flex items-center gap-2">
<div class="w-6 h-6 bg-cyan-500/10 flex items-center justify-center rounded">
📹
</div>
<span class="font-semibold">Face<span class="text-cyan-400">Meet</span></span>
</div>


<div class="flex items-center gap-4 text-sm">

<div class="flex items-center gap-1 text-green-400">
<span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
Live
</div>

<button id="participantsBtn"
class="flex items-center gap-2 bg-slate-800 px-3 py-1 rounded hover:bg-slate-700">

👥
<span id="participantsCount">1</span>

</button>

<button id="viewReportBtn"
class="hidden items-center gap-2 bg-cyan-600 px-3 py-1 rounded hover:bg-cyan-500 text-sm">

📊

</button>

</div>

</div>

<div class="flex flex-1 overflow-hidden">


<div id="video-grid"
class="flex-1 p-2 grid gap-4 overflow-y-auto">
</div>

<div id="participantsPanel"
class="w-72 bg-slate-900 border-l border-slate-800 p-4 hidden rounded-xl flex-col">

<div class="flex justify-between items-center mb-4">

<h3 class="font-semibold text-lg">
Participants
</h3>

<button id="closeParticipants">✖</button>

</div>

<div id="participantsList" class="space-y-3 rounded-xl text-sm"></div>

</div>

</div>

<div id="controlBar"
class="fixed bottom-3 left-0 right-0 md:relative
flex items-center justify-center gap-3
bg-black backdrop-blur-lg
border border-black/50
rounded-2xl md:rounded-none
p-2 md:p-0 md:bg-black md:border-0">

<button id="micBtn"
class="control-btn">
<i data-lucide="mic"></i>
</button>


<button id="screenBtn"
class="control-btn">
<i data-lucide="monitor-up"></i>
</button>

<div class="w-px h-8 bg-slate-700 mx-1"></div>

<button id="leaveBtn"
class="control-btn bg-red-600 hover:bg-red-500">
<i data-lucide="phone-off"></i>
</button>

</div>

<div id="reportOverlay"
class="hidden fixed inset-0 bg-black/60 backdrop-blur-md items-center justify-center z-50">

<div class="bg-slate-900/90 backdrop-blur-xl border border-white/10
rounded-xl p-5 w-[85%] max-w-5xl max-h-[80vh] overflow-y-auto">
</div>


<div class="flex justify-between items-center mb-4">

<h2 class="text-xl font-semibold">Meeting Analytics</h2>

<button id="closeReport" class="text-red-400">✖</button>

</div>

<div class="grid md:grid-cols-2 grid-cols-1 gap-6">


<canvas id="focusChart" class="max-h-[260px]"></canvas>
<canvas id="distractionChart" class="max-h-[260px]"></canvas>

</div>

<div class="mt-6">

<canvas id="emotionChart" class="max-h-[320px]"></canvas>

</div>

<div class="mt-8 text-center">

<button id="downloadReportBtn"
class="bg-cyan-600 px-6 py-2 rounded hover:bg-cyan-500">

Download Report

</button>

</div>

</div>

</div>


<script>

const ROOM_ID="{{room_id}}"

const socket = io()
let users={}

const peers={}
let localStream=null

const grid=document.getElementById("video-grid")
const participantsList=document.getElementById("participantsList")

const micBtn=document.getElementById("micBtn")
const camBtn=document.getElementById("camBtn")
const leaveBtn=document.getElementById("leaveBtn")
const screenBtn=document.getElementById("screenBtn")
const IS_HOST = new URLSearchParams(window.location.search).get("host") === "true"
let distractionCount = {}
let analyticsData = {}
let focusChart
let distractionChart
let emotionChart

let micEnabled=true
let camEnabled=true

let USER_NAME = localStorage.getItem("meet_name")

if(!USER_NAME){

USER_NAME = prompt("Enter your name")

localStorage.setItem("meet_name", USER_NAME)

}

document.addEventListener("DOMContentLoaded", () => {
    lucide.createIcons()
})


if(IS_HOST){
document.getElementById("viewReportBtn").classList.remove("hidden")
}

const participantsBtn = document.getElementById("participantsBtn")
const participantsPanel = document.getElementById("participantsPanel")
const closeParticipants = document.getElementById("closeParticipants")

participantsBtn.onclick = () => {
participantsPanel.classList.remove("hidden")
participantsPanel.classList.add("flex")
}

closeParticipants.onclick = () => {
participantsPanel.classList.add("hidden")
}

const downloadBtn = document.getElementById("downloadReportBtn")

if(downloadBtn){

downloadBtn.onclick = () => {

window.open(`/download-report/${ROOM_ID}`)

}

}


async function startCamera(){

try{

localStream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
})

}catch(err){

console.log("Trying fallback camera")

localStream = await navigator.mediaDevices.getUserMedia({
video:true
})

}

addVideo(localStream, socket.id, USER_NAME, true)

socket.emit("join-room",{
room:ROOM_ID,
name:USER_NAME,
host:IS_HOST
})

socket.emit("get-users")

startSpeakerDetection()
startRealtimeAnalysis()

}



socket.on("connect", () => {
startCamera()
})



function addVideo(stream,id,name,isSelf=false){

if(document.getElementById("tile-"+id)) return

const tile=document.createElement("div")
tile.id="tile-"+id

tile.className =
"video-tile bg-slate-900 border border-slate-800 rounded-xl overflow-hidden relative flex items-center justify-center"
tile.style.width = "100%"
tile.style.height = "90%"
tile.style.aspectRatio = "16/9"
const video=document.createElement("video")

video.srcObject = stream

video.setAttribute("playsinline", true)
video.setAttribute("autoplay", true)
video.setAttribute("muted", true)
video.autoplay=true
video.playsInline=true
video.muted=isSelf
video.className="w-full h-full object-cover"

tile.appendChild(video)

const label=document.createElement("div")
label.className="absolute bottom-3 left-3 bg-black/60 px-3 py-1 rounded-full text-xs"

if(isSelf)
label.innerText="You"
else
label.innerText=name

tile.appendChild(label)
video.onloadedmetadata = () => {
video.play()
}

grid.appendChild(tile)
adjustTileSizes()
updateLayout()

}

function adjustTileSizes(){

const tiles = document.querySelectorAll(".video-tile")
const count = tiles.length

let basis = "420px"

if(count === 1) basis = "70%"
else if(count === 2) basis = "45%"
else if(count === 3) basis = "40%"
else if(count === 4) basis = "35%"
else if(count <= 6) basis = "30%"
else basis = "25%"

return

}


/* PARTICIPANTS */

function addParticipant(id,name){

if(document.getElementById("p-"+id)) return

const item=document.createElement("div")
item.id="p-"+id

item.className="flex items-center justify-between bg-slate-800 p-2 rounded"

item.innerHTML=`
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 rounded-full bg-cyan-500 flex items-center justify-center text-xs">
    ${name[0]}
    </div>
    ${name}
  </div>

  <div class="text-xs text-slate-400">
  🎤 📷
  </div>
`

participantsList.appendChild(item)

}


/* WEBRTC PEER */

function createPeer(userId){

const peer=new RTCPeerConnection({
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
})

peer.ontrack = e => {

const stream = e.streams[0]

const name = users[userId] || "Participant"

addVideo(stream, userId, name)

}

peer.onicecandidate=e=>{
if(e.candidate){
socket.emit("ice-candidate",{target:userId,candidate:e.candidate})
}
}

return peer

}


socket.on("update-users", userMap => {

users = userMap

participantsList.innerHTML=""

const ids = Object.keys(users)

document.getElementById("participantsCount").innerText = ids.length

const hostId = ids[0]   // first user = host

ids.forEach(id => {

const name = users[id]

const isHost = id === hostId

const item=document.createElement("div")

item.className="flex items-center justify-between bg-slate-800 p-2 rounded"

item.innerHTML=`
<div class="flex items-center gap-2">

<div class="w-8 h-8 rounded-full bg-cyan-500 flex items-center justify-center text-xs">
${name.charAt(0).toUpperCase()}
</div>

<div class="flex flex-col">

<span class="text-sm">
${name} ${id===socket.id ? "(You)" : ""}
</span>

${isHost ? '<span class="text-xs text-cyan-400">Host</span>' : ''}

</div>

</div>

<div class="text-xs text-slate-400">
🎤 📷
</div>
`

participantsList.appendChild(item)

})

})


socket.on("existing-users", async userList => {

userList.forEach(async user => {

if(user.id === socket.id) return

const peer = createPeer(user.id)
peers[user.id] = peer

localStream.getTracks().forEach(track=>{
peer.addTrack(track, localStream)
})

const offer = await peer.createOffer()
await peer.setLocalDescription(offer)

socket.emit("offer", {
target: user.id,
offer: offer
})

})

})

socket.on("user-connected",async user=>{

addParticipant(user.id,user.name)

const peer=createPeer(user.id)
peers[user.id]=peer

localStream.getTracks().forEach(track=>{
peer.addTrack(track,localStream)
})

const offer=await peer.createOffer()
await peer.setLocalDescription(offer)

socket.emit("offer",{target:user.id,offer})

})

socket.on("offer",async data=>{

const peer=createPeer(data.from)
peers[data.from]=peer

await peer.setRemoteDescription(data.offer)

localStream.getTracks().forEach(track=>{
peer.addTrack(track,localStream)
})

const answer=await peer.createAnswer()
await peer.setLocalDescription(answer)

socket.emit("answer",{target:data.from,answer})

})

socket.on("answer",async data=>{
if(peers[data.from])
await peers[data.from].setRemoteDescription(data.answer)
})


socket.on("ice-candidate",async data=>{
if(peers[data.from])
await peers[data.from].addIceCandidate(data.candidate)
})

socket.on("user-disconnected",id=>{

if(peers[id]) peers[id].close()

delete peers[id]

const tile=document.getElementById("tile-"+id)
if(tile) tile.remove()

const p=document.getElementById("p-"+id)
if(p) p.remove()

updateLayout()
adjustTileSizes()
})


micBtn.onclick = () => {

micEnabled = !micEnabled

localStream.getAudioTracks().forEach(track=>{
track.enabled = micEnabled
})

const icon = micBtn.querySelector("svg")

if(micEnabled){
icon.setAttribute("data-lucide","mic")
micBtn.classList.remove("bg-red-600")
}
else{
icon.setAttribute("data-lucide","mic-off")
micBtn.classList.add("bg-red-600")
}

lucide.createIcons()


}

function updateLayout(){

const tiles = document.querySelectorAll(".video-tile")
const count = tiles.length

let cols = 1

if(count === 1){
cols = 1
}
else if(count === 2){
cols = 2
}
else if(count <= 4){
cols = 2
}
else if(count <= 6){
cols = 3
}
else if(count <= 9){
cols = 3
}
else{
cols = 4
}

grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`

}


screenBtn.onclick=async()=>{

const screenStream=await navigator.mediaDevices.getDisplayMedia({
video:true
})

const track=screenStream.getVideoTracks()[0]

Object.values(peers).forEach(peer=>{

const sender=peer.getSenders().find(s=>s.track.kind==="video")

sender.replaceTrack(track)

})

track.onended=()=>{
replaceCamera()
}

}


function replaceCamera(){

const camTrack=localStream.getVideoTracks()[0]

Object.values(peers).forEach(peer=>{

const sender=peer.getSenders().find(s=>s.track.kind==="video")

sender.replaceTrack(camTrack)

})

}


function playBeep(){

const ctx = new AudioContext()
const oscillator = ctx.createOscillator()
const gain = ctx.createGain()

oscillator.connect(gain)
gain.connect(ctx.destination)

oscillator.frequency.value = 700
oscillator.type = "sine"

oscillator.start()

gain.gain.setValueAtTime(0.2, ctx.currentTime)
gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25)

oscillator.stop(ctx.currentTime + 0.25)

}


function startSpeakerDetection(){

const ctx=new AudioContext()
const analyser=ctx.createAnalyser()
const mic=ctx.createMediaStreamSource(localStream)

mic.connect(analyser)

const data=new Uint8Array(analyser.frequencyBinCount)

function detect(){

analyser.getByteFrequencyData(data)

const volume=data.reduce((a,b)=>a+b)/data.length

const tile=document.getElementById("tile-"+socket.id)

if(volume>35)
tile.style.boxShadow="0 0 0 4px #22c55e"
else
tile.style.boxShadow="none"

requestAnimationFrame(detect)

}

detect()

}

function startRealtimeAnalysis(){

setInterval(()=>{

const tile = document.getElementById("tile-"+socket.id)

if(!tile) return

const video = tile.querySelector("video")

if(!video || video.readyState !== 4) return

const canvas = document.createElement("canvas")
canvas.width = 320
canvas.height = 240

const ctx = canvas.getContext("2d")
ctx.drawImage(video,0,0,320,240)

const frame = canvas.toDataURL("image/jpeg")

socket.emit("analyze-frame",{
    image: frame,
    room: ROOM_ID,
    user: socket.id
})

},2500)

}

function getEmotionEmoji(emotion){

const map = {
happy:"😄",
sad:"😔",
angry:"😡",
fear:"😨",
surprise:"😲",
neutral:"😐",
disgust:"🤢"
}

return map[emotion] || "🙂"
}


socket.on("emotion-result",(data)=>{
  if(!analyticsData[data.user]){

  analyticsData[data.user] = {
  focus:[],
  distraction:[],
  emotion:[]
  }

  }

  analyticsData[data.user].focus.push(data.focus)
  analyticsData[data.user].distraction.push(data.distraction)
  analyticsData[data.user].emotion.push(data.emotion)

  const tile = document.getElementById("tile-"+data.user)

  if(!tile) return

  if(IS_HOST){
  updateCharts()
  }
  if(!IS_HOST){
  const overlay = tile.querySelector(".ai-overlay")
  if(overlay) overlay.remove()
  return
}

let overlay = tile.querySelector(".ai-overlay")

if(!overlay){

overlay = document.createElement("div")
overlay.className =
"ai-overlay absolute bottom-2 left-2 right-2 backdrop-blur-md bg-black/60 border border-white/10 text-white text-[11px] px-2 py-1 rounded-lg shadow-lg"

tile.appendChild(overlay)

}

overlay.innerHTML = `
<div class="flex flex-col gap-1">

<div class="text-[10px] text-cyan-400 flex items-center gap-1">
<span class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></span>
AI Insight
</div>

<div class="flex items-center gap-1 text-sm">
🧠 <span class="font-semibold">${data.emotion}</span>
</div>

<div class="flex items-center gap-2 text-xs">
  <span>Focus</span>
<div class="w-16 h-1 bg-slate-700 rounded">
<div style="width:${data.focus}%" class="h-1 bg-green-400 rounded"></div>
</div>
<span>${data.focus}%</span>
</div>

<div class="flex items-center gap-2 text-xs">
<span>Distract</span>
<div class="w-16 h-1 bg-slate-700 rounded">
<div style="width:${data.distraction}%" class="h-1 bg-red-400 rounded"></div>
</div>
<span>${data.distraction}%</span>
</div>

<div class="text-[10px] text-red-400">
⚠ Distractions: ${data.distraction_count}
</div>

</div>
`

})

const overlay = document.getElementById("reportOverlay")

document.getElementById("viewReportBtn").onclick = () => {

overlay.classList.remove("hidden")

}

document.getElementById("closeReport").onclick = () => {

overlay.classList.add("hidden")

}

function updateCharts(){

const participants = Object.keys(analyticsData)

const avgFocus=[]
const avgDistraction=[]
const emotionCount={}

participants.forEach(user=>{

const f = analyticsData[user].focus
const d = analyticsData[user].distraction
const e = analyticsData[user].emotion

avgFocus.push(f.reduce((a,b)=>a+b)/f.length)
avgDistraction.push(d.reduce((a,b)=>a+b)/d.length)

e.forEach(em=>{
emotionCount[em] = (emotionCount[em]||0)+1
})

})

if(!focusChart){

focusChart = new Chart(document.getElementById("focusChart"),{
type:"bar",
data:{labels:participants,datasets:[{label:"Focus %",data:avgFocus}]}
})

}else{

focusChart.data.labels = participants
focusChart.data.datasets[0].data = avgFocus
focusChart.update()

}

if(!distractionChart){

distractionChart = new Chart(document.getElementById("distractionChart"),{
type:"bar",
data:{labels:participants,datasets:[{label:"Distraction %",data:avgDistraction}]}
})

}else{

distractionChart.data.labels = participants
distractionChart.data.datasets[0].data = avgDistraction
distractionChart.update()

}

if(!emotionChart){

emotionChart = new Chart(document.getElementById("emotionChart"),{
type:"pie",
data:{labels:Object.keys(emotionCount),
datasets:[{data:Object.values(emotionCount)}]}
})

}else{

emotionChart.data.labels = Object.keys(emotionCount)
emotionChart.data.datasets[0].data = Object.values(emotionCount)
emotionChart.update()

}

}


leaveBtn.onclick=()=>{

if(localStream)
localStream.getTracks().forEach(t=>t.stop())

Object.values(peers).forEach(p=>p.close())

socket.disconnect()

window.location="http://localhost:5173/dashboard"

}


</script>

</body>
</html>
